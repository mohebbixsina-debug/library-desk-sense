# Spin up InfluxDB 2.x + Mosquitto MQTT broker for the proxy.
#   docker compose up -d
services:
  influxdb:
    image: influxdb:2.7
    ports: ["8086:8086"]
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: change-me-local-password
      DOCKER_INFLUXDB_INIT_ORG: library
      DOCKER_INFLUXDB_INIT_BUCKET: desksense
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: change-me-local-token
    volumes: ["influx-data:/var/lib/influxdb2"]

  mosquitto:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]
    volumes: ["./mosquitto.conf:/mosquitto/config/mosquitto.conf"]

  grafana:
    image: grafana/grafana:11.6.0
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on: [influxdb]
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboard.json:/var/lib/grafana/dashboards/librarydesksense.json:ro

volumes:
  influx-data:
  grafana-data:
